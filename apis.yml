    description: >-
      The KrakenD Service API exposes built-in operational endpoints on a
      running KrakenD API Gateway instance. The health endpoint (/__health)
      returns gateway status and is enabled by default. The debug endpoint
      (/__debug) echoes request details for troubleshooting when enabled.
      The extended metrics endpoint (/__stats) provides detailed runtime
      metrics on a separate port when telemetry is configured. The echo
      endpoint (/__echo) returns incoming request details for testing.
