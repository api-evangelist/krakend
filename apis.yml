description: >-
  KrakenD is a high-performance, stateless, distributed API Gateway designed
  to help developers build scalable and resilient microservices architectures.
  It aggregates multiple backend services into single endpoints, performing
  response merging, data transformation, filtering, throttling,
  authentication, and caching automatically. KrakenD uses a declarative
  configuration file (krakend.json) to define endpoints and backends,
  supports plugins for extensibility, and provides built-in health check,
  debug, and metrics endpoints for operational visibility.
