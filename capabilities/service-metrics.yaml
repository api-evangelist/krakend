naftiko: 1.0.0-alpha2
info:
  label: KrakenD Service API — Metrics
  description: 'KrakenD Service API — Metrics. 1 operations. Lead operation: KrakenD Extended metrics. Self-contained Naftiko
    capability covering one Krakend business surface.'
  tags:
  - Krakend
  - Metrics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KRAKEND_API_KEY: KRAKEND_API_KEY
capability:
  consumes:
  - type: http
    namespace: service-metrics
    baseUri: http://localhost:8080
    description: KrakenD Service API — Metrics business capability. Self-contained, no shared references.
    resources:
    - name: __stats
      path: /__stats/
      operations:
      - name: getstats
        method: GET
        description: KrakenD Extended metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: service-metrics-rest
    port: 8080
    description: REST adapter for KrakenD Service API — Metrics. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/stats
      name: stats
      description: REST surface for __stats.
      operations:
      - method: GET
        name: getstats
        description: KrakenD Extended metrics
        call: service-metrics.getstats
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: service-metrics-mcp
    port: 9090
    transport: http
    description: MCP adapter for KrakenD Service API — Metrics. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: krakend-extended-metrics
      description: KrakenD Extended metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: service-metrics.getstats
      outputParameters:
      - type: object
        mapping: $.
