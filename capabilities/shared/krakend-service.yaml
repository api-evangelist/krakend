naftiko: "1.0.0-alpha1"

info:
  label: "KrakenD Service API"
  description: "KrakenD Service API for health, debug, echo, and extended runtime metrics on a running KrakenD gateway instance."
  tags:
    - API Gateway
    - KrakenD
    - Observability
  created: "2026-05-04"
  modified: "2026-05-04"

binds:
  - namespace: env
    keys:
      KRAKEND_GATEWAY_URL: KRAKEND_GATEWAY_URL
      KRAKEND_METRICS_URL: KRAKEND_METRICS_URL

capability:
  consumes:
    - type: http
      namespace: krakend-service
      baseUri: "{KRAKEND_GATEWAY_URL}"
      description: "KrakenD Service API for operational endpoints exposed by the gateway."
      resources:
        - name: health
          path: /__health
          description: "Gateway health checks."
          operations:
            - name: get-health
              method: GET
              description: "Return the health status of the KrakenD instance."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: debug
          path: /__debug/{path}
          description: "Echoing debug endpoint that logs request details."
          operations:
            - name: debug-get
              method: GET
              description: "GET against the debug echo endpoint at the supplied sub-path."
              inputParameters:
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Arbitrary sub-path appended to /__debug."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: debug-post
              method: POST
              description: "POST against the debug echo endpoint at the supplied sub-path."
              inputParameters:
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Arbitrary sub-path appended to /__debug."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  payload: "{{tools.payload}}"
        - name: echo
          path: /__echo/
          description: "Echo endpoint returning request details."
          operations:
            - name: get-echo
              method: GET
              description: "Return the headers, query string, method, path, and body of the request."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

    - type: http
      namespace: krakend-metrics
      baseUri: "{KRAKEND_METRICS_URL}"
      description: "KrakenD extended metrics endpoint exposed on a separate port."
      resources:
        - name: stats
          path: /__stats/
          description: "Extended runtime metrics."
          operations:
            - name: get-stats
              method: GET
              description: "Return router, proxy, backend, and Go runtime statistics."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: krakend-service-api
      resources:
        - path: /v1/health
          name: health
          description: "Gateway health."
          operations:
            - method: GET
              name: get-health
              description: "Return the health status of the KrakenD instance."
              call: "krakend-service.get-health"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/echo
          name: echo
          description: "Echo endpoint."
          operations:
            - method: GET
              name: get-echo
              description: "Return request details from the echo endpoint."
              call: "krakend-service.get-echo"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/stats
          name: stats
          description: "Runtime metrics."
          operations:
            - method: GET
              name: get-stats
              description: "Return extended runtime metrics."
              call: "krakend-metrics.get-stats"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: krakend-service-mcp
      transport: http
      tools:
        - name: get-health
          description: "Return the KrakenD gateway health status."
          hints:
            readOnly: true
          call: "krakend-service.get-health"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-echo
          description: "Return request details from the KrakenD echo endpoint."
          hints:
            readOnly: true
          call: "krakend-service.get-echo"
          outputParameters:
            - type: object
              mapping: "$."
        - name: debug-get
          description: "Issue a GET against the KrakenD debug endpoint at a sub-path."
          hints:
            readOnly: true
          call: "krakend-service.debug-get"
          with:
            path: "tools.path"
          outputParameters:
            - type: object
              mapping: "$."
        - name: debug-post
          description: "Issue a POST against the KrakenD debug endpoint at a sub-path."
          hints:
            readOnly: false
          call: "krakend-service.debug-post"
          with:
            path: "tools.path"
            payload: "tools.payload"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-stats
          description: "Return extended runtime metrics from the KrakenD metrics port."
          hints:
            readOnly: true
          call: "krakend-metrics.get-stats"
          outputParameters:
            - type: object
              mapping: "$."
