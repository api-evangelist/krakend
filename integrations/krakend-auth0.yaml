naftiko: 1.0.0-alpha2
info:
  label: Validate Auth0-issued JWTs at the KrakenD gateway edge
  description: Use KrakenD's JWT validator plugin pointed at Auth0's JWKS endpoint to enforce token signature, expiry, audience, and required scopes at the gateway edge — rejecting unauthenticated calls before they ever reach a backend service.
  tags:
  - KrakenD
  - Integration
  - Identity
  - auth0
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    KRAKEND_API_KEY: KRAKEND_API_KEY
    AUTH0_API_KEY: AUTH0_API_KEY
capability:
  consumes:
  - type: http
    namespace: krakend
    baseUri: https://api.krakend.io
    description: KrakenD API operations consumed by this integration.
    resources:
    - name: health
      path: /__health
      operations:
      - name: gethealth
        method: GET
        description: Confirm KrakenD is up before exposing protected routes behind the JWT validator.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: stats
      path: /__stats/
      operations:
      - name: getstats
        method: GET
        description: Pull per-endpoint stats to track 401 rates for misconfigured JWT validation.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
  - type: http
    namespace: auth0
    baseUri: https://yourdomain.auth0.com
    description: Auth0 Management API operations consumed by this integration.
    resources:
    - name: well-known-jwks-json
      path: /.well-known/jwks.json
      operations:
      - name: getjwks
        method: GET
        description: 'Auth0 Management API: getJwks'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: api-v2-users-id
      path: /api/v2/users/{id}
      operations:
      - name: getuser
        method: GET
        description: 'Auth0 Management API: getUser'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
  exposes:
  - type: mcp
    namespace: krakend-auth0-mcp
    description: MCP adapter for the krakend-auth0 integration.
    tools:
    - name: krakend_auth0
      description: Execute the krakend auth0 integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: krakend-auth0-rest
    port: 8080
    description: REST adapter for the krakend-auth0 integration.
    resources:
    - path: /krakend-auth0
      name: krakend-auth0
      description: REST surface for the krakend-auth0 integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the krakend-auth0 integration.
        call: krakend_auth0
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
