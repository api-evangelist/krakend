naftiko: 1.0.0-alpha2
info:
  label: Stream KrakenD gateway metrics and events into Datadog
  description: Forward KrakenD gateway request counts, latency percentiles, and per-backend error rates into Datadog as custom metrics, plus high-cardinality deploy and health-state changes as Datadog events for unified API observability dashboards.
  tags:
  - KrakenD
  - Integration
  - Observability
  - datadog
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    KRAKEND_API_KEY: KRAKEND_API_KEY
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: krakend
    baseUri: https://api.krakend.io
    description: KrakenD API operations consumed by this integration.
    resources:
    - name: stats
      path: /__stats/
      operations:
      - name: getstats
        method: GET
        description: Pull KrakenD extended runtime metrics for shipping to Datadog.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: health
      path: /__health
      operations:
      - name: gethealth
        method: GET
        description: KrakenD health check used to gate metric submission and flag downtime events.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
  - type: http
    namespace: datadog
    baseUri: https://api.datadoghq.com
    description: Datadog Metrics API operations consumed by this integration.
    resources:
    - name: api-v2-series
      path: /api/v2/series
      operations:
      - name: submitmetrics
        method: POST
        description: 'Datadog Metrics API: submitMetrics'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v1-events
      path: /api/v1/events
      operations:
      - name: postevent
        method: POST
        description: 'Datadog Metrics API: postEvent'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: krakend-datadog-mcp
    description: MCP adapter for the krakend-datadog integration.
    tools:
    - name: krakend_datadog
      description: Execute the krakend datadog integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: krakend-datadog-rest
    port: 8080
    description: REST adapter for the krakend-datadog integration.
    resources:
    - path: /krakend-datadog
      name: krakend-datadog
      description: REST surface for the krakend-datadog integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the krakend-datadog integration.
        call: krakend_datadog
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
