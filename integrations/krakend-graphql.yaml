naftiko: 1.0.0-alpha2
info:
  label: Aggregate GraphQL upstreams into a KrakenD BFF endpoint
  description: Use KrakenD's response aggregator to fan out a single client request to multiple GraphQL upstream services (or REST + GraphQL hybrids), merging the responses into one BFF payload optimized for mobile or web client consumption.
  tags:
  - KrakenD
  - Integration
  - Backends
  - graphql
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    KRAKEND_API_KEY: KRAKEND_API_KEY
    GRAPHQL_API_KEY: GRAPHQL_API_KEY
capability:
  consumes:
  - type: http
    namespace: krakend
    baseUri: https://api.krakend.io
    description: KrakenD API operations consumed by this integration.
    resources:
    - name: stats
      path: /__stats/
      operations:
      - name: getstats
        method: GET
        description: Track GraphQL upstream aggregation latency per endpoint.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: debug-path
      path: /__debug/{path}
      operations:
      - name: debugendpointpost
        method: POST
        description: Inspect aggregated GraphQL response shape during BFF endpoint design.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: path
          in: path
          type: string
          description: Path parameter path.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: graphql
    baseUri: https://graphql.internal.example.com
    description: GraphQL HTTP API operations consumed by this integration.
    resources:
    - name: graphql
      path: /graphql
      operations:
      - name: executequery
        method: POST
        description: 'GraphQL HTTP API: executeQuery'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: graphql-schema
      path: /graphql/schema
      operations:
      - name: getschema
        method: GET
        description: 'GraphQL HTTP API: getSchema'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
  exposes:
  - type: mcp
    namespace: krakend-graphql-mcp
    description: MCP adapter for the krakend-graphql integration.
    tools:
    - name: krakend_graphql
      description: Execute the krakend graphql integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: krakend-graphql-rest
    port: 8080
    description: REST adapter for the krakend-graphql integration.
    resources:
    - path: /krakend-graphql
      name: krakend-graphql
      description: REST surface for the krakend-graphql integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the krakend-graphql integration.
        call: krakend_graphql
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
