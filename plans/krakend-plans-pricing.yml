specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: KrakenD
providerId: krakend
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Gateway
  - API Aggregation
  - API Management
  - Open Source
description: KrakenD is an open-source, stateless, declarative API gateway. The Community Edition is
  free under the Apache 2.0 license. KrakenD Enterprise is a commercial offering with a flat predictable
  contract that explicitly is not metered by API count or throughput; the price is quoted by sales. Enterprise
  adds FIPS, multi-IdP, JMESPath transformations, gRPC/WebSocket, SOAP-to-JSON, custom plugin services,
  onboarding, security updates, and core-engineer support.
sources:
  - https://www.krakend.io/enterprise/
plans:
  - id: krakend-community
    name: Community Edition
    type: freemium
    description: Open-source Apache 2.0 KrakenD; self-service support; basic API gateway functionality.
    entries:
      - label: License
        name: ce_license
        type: subscription
        metric: license
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Open-source (Apache 2.0)
      - name: Self-service support (community)
      - name: Core API gateway features (aggregation, routing, transformations)
  - id: krakend-enterprise
    name: KrakenD Enterprise
    type: enterprise
    description: Flat-rate enterprise contract not tied to API count or throughput; pricing quoted by
      sales. Includes core-engineer support, FIPS, advanced security, multi-IdP, gRPC/WebSocket, JMESPath,
      SOAP-to-JSON, custom plugin development, onboarding/training, security updates, architecture reviews.
    entries:
      - label: Enterprise contract
        name: enterprise_contract
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Direct support from core engineers
      - name: FIPS compliance
      - name: Multiple identity provider support
      - name: Advanced API transformations (JMESPath)
      - name: gRPC and WebSocket support
      - name: SOAP-to-JSON conversion
      - name: Custom plugin development services
      - name: Professional onboarding and training
      - name: Security fixes and updates
      - name: Architecture and code reviews
      - name: Predictable pricing not linked to API count or throughput
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
